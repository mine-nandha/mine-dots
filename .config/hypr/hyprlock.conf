# ─── Hyprlock ───────────────────────────────────────────────────────────
# Lock screen config

general {
    no_fade_in = false
    grace = 2
    ignore_empty_input = true
}

# ── Background ──────────────────────────────────────────────────────────
background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 8
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.5
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

# ── Clock ───────────────────────────────────────────────────────────────
label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%H:%M')"
    color = rgba(255, 255, 255, 0.9)
    font_size = 96
    font_family = JetBrainsMono Nerd Font
    position = 0, 100
    halign = center
    valign = center
}

# ── Date ────────────────────────────────────────────────────────────────
label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%A, %d %B %Y')"
    color = rgba(255, 255, 255, 0.6)
    font_size = 20
    font_family = JetBrainsMono Nerd Font
    position = 0, 40
    halign = center
    valign = center
}

# ── Unlock prompt ──────────────────────────────────────────────────────
# Only shows if input is empty — helps indicate it's locked
label {
    monitor =
    text = Type password to unlock
    color = rgba(255, 255, 255, 0.3)
    font_size = 14
    font_family = JetBrainsMono Nerd Font
    position = 0, -80
    halign = center
    valign = center
}

# ── Input field ─────────────────────────────────────────────────────────
input-field {
    monitor =
    size = 300, 50
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.5
    dots_center = true
    outer_color = rgba(255, 255, 255, 0.3)
    inner_color = rgba(0, 0, 0, 0.4)
    font_color = rgba(255, 255, 255, 0.8)
    fade_on_empty = true
    placeholder_text = <i>Password...</i>
    hide_input = false
    position = 0, -160
    halign = center
    valign = center
}

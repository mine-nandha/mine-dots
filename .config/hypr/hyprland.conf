# =========================================================
# BASIC HYPRLAND CONFIG
# =========================================================

# VARIABLES
$mainMod = SUPER
$terminal = kitty
$fileManager = dolphin
$menu = fuzzel
$editor = zeditor
$browser = google-chrome-stable

# =========================================================
# MONITOR
# =========================================================

monitor=,preferred,auto,1.25

# =========================================================
# AUTOSTART
# =========================================================
exec-once = waybar & hyprpaper & dunst & hyprpolkitagent & blueman-applet & hypridle
# Clipboard
exec-once = wl-paste --type text --watch cliphist store
# XDG
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = eval $(gnome-keyring-daemon --start --components=secrets)

# =========================================================
# ENVIRONMENT VARIABLES
# =========================================================

env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = QT_QPA_PLATFORM,wayland
env = XCURSOR_SIZE,24

# =========================================================
# INPUT
# =========================================================

input {
    kb_layout = us
    follow_mouse = 1

    touchpad {
        natural_scroll = true
    }

    sensitivity = 0
}

# =========================================================
# GESTURES
# =========================================================

gestures {
    workspace_swipe_distance = 300
    workspace_swipe_invert = true
    workspace_swipe_cancel_ratio = 0.3
    workspace_swipe_create_new = false
    gesture = 3, horizontal, workspace
}

# =========================================================
# GENERAL
# =========================================================

general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2

    layout = dwindle
}

# =========================================================
# DECORATION
# =========================================================

decoration {
    rounding = 8

    blur {
        enabled = true
        size = 3
        passes = 1
    }
}

# =========================================================
# ANIMATIONS
# =========================================================

animations {
    enabled = true
}

# =========================================================
# LAYOUTS
# =========================================================

dwindle {
    preserve_split = true
}

# =========================================================
# MISC
# =========================================================

misc {
    force_default_wallpaper = 0
}

# =========================================================
# YOUR EXISTING KEYBINDS
# =========================================================

bind = $mainMod, T, exec, $terminal
bind = ALT, F4, killactive
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, SPACE, exec, $menu
bind = $mainMod, V, exec, cliphist list | fuzzel --dmenu | cliphist decode | wl-copy

# =========================================================
# ADDITIONAL NECESSARY KEYBINDS
# =========================================================

# HYPRLAND
bind = $mainMod SHIFT, Q, exit
bind = $mainMod, F, fullscreen
bind = $mainMod, M, pseudo

# APPS
bind = $mainMod, B, exec, $browser
bind = $mainMod, C, exec, $editor
bind = $mainMod, L, exec, hyprlock
bind = $mainMod, O, exec, pkill hyprsunset || hyprsunset --temperature 4500

# WINDOW FOCUS
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# MOVE WINDOWS
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

# RESIZE WINDOWS
bind = $mainMod CTRL, left, resizeactive, -50 0
bind = $mainMod CTRL, right, resizeactive, 50 0
bind = $mainMod CTRL, up, resizeactive, 0 -50
bind = $mainMod CTRL, down, resizeactive, 0 50

# WORKSPACES
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# MOVE WINDOW TO WORKSPACE
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# SCREENSHOT
bind = , PRINT, exec, hyprshot -m window
bind = $mainMod SHIFT, S, exec, hyprshot -m region

# AUDIO
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

# BRIGHTNESS
bindel = , XF86MonBrightnessUp, exec, brightnessctl set +5%
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 1%-

# MOUSE
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
